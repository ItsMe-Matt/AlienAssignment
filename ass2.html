            function takeAStep()
            {
                // .src is in this format: "images/alien/alienrwalk14.gif"
                currentStep++   // adds one to currentStep

                if(currentStep > 30)
                {
                    currentStep = 0
                }

                myAlien.src = "images/alien/alienrwalk" + currentStep + ".gif"
            }

            function takeAStepBack()
            {
                currentStep++

                if(currentStep > 30)
                {
                    currentStep = 0
                }

                myAlien.src = "images/alien/alienlwalk" + currentStep + ".gif"
            }


            function moveRight()
            {
                if (parseInt(myAlien.style.left) >= window.screen.width - 80) {
                    isReverse = true;
                }
                if (isReverse == true) {
                    takeAStepBack()
                    myAlien.style.left = parseInt(myAlien.style.left) - 1 + "px"
                }
                if (parseInt(myAlien.style.left) <=  0)
                {
                    isReverse = false;
                }
                if (isReverse == false)
                {
                    takeAStep()
                    myAlien.style.left = parseInt(myAlien.style.left) + 1 + "px"
                }
            }

            function moveUp()
            {
                myAlien.style.top = parseInt(myAlien.style.top) - 1 + "px"
            }

            function moveDown()
            {
                myAlien.style.top = parseInt(myAlien.style.top) + 1 + "px"
            }

            function stopMoving()
            {
                if(moveTimer != null)
                {
                    isReverse = false
                    clearInterval(moveTimer)
                    moveTimer = null
                }
            }

            function handleTheKeyPress(setCKeyDownEvent)

                        // stop movingRight after two seconds
                        //setTimeout(stopMoving, 2000)
                         direction = "left"
                    }
